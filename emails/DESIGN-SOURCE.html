<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClinicFlow · תבניות אימייל — תצוגה מקדימה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --primary:#0d47a1; --logo:#2756A6; --teal:#00838f; --text:#1a2332; --muted:#6b7c93;
    --border:#e1e6ec; --bg:#f8fafb; --card:#fff; --accent:#e8f4f8; --radius:14px;
    --success:#0f7b4f; --success-s:#e7f6ee; --warn:#b45309; --warn-s:#fdf2e3; --danger:#c0362c; --danger-s:#fbecea;
    --grad:linear-gradient(90deg,#0d47a1 0%,#00838f 100%);
    --font:'Heebo',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--font);background:#eef2f6;color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
  /* Page shell */
  .top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
       border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;font-weight:800;font-size:18px}
  .brand .wm{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .l{font-weight:500}
  .top h1{font-size:14px;font-weight:600;color:var(--muted);margin:0}
  .spacer{flex:1}
  .seg{display:inline-flex;background:#eef2f6;border:1px solid var(--border);border-radius:999px;padding:3px}
  .seg button{border:0;background:transparent;font-family:var(--font);font-size:13px;font-weight:600;color:var(--muted);
       padding:6px 14px;border-radius:999px;cursor:pointer}
  .seg button.on{background:#fff;color:var(--primary);box-shadow:0 1px 3px rgba(16,40,80,.12)}
  .count{font-size:12.5px;color:var(--muted);font-weight:600}
  .layout{display:grid;grid-template-columns:250px 1fr;gap:0;align-items:start}
  /* TOC */
  .toc{position:sticky;top:57px;align-self:start;height:calc(100vh - 57px);overflow:auto;
       border-inline-start:1px solid var(--border);padding:18px 16px 60px;background:#fff}
  .toc .grp{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--primary);text-transform:uppercase;
       margin:18px 0 7px;padding-inline-start:4px}
  .toc a{display:flex;gap:9px;align-items:baseline;text-decoration:none;color:var(--text);font-size:13.5px;
       padding:6px 8px;border-radius:8px;transition:background .12s}
  .toc a:hover{background:var(--accent)}
  .toc a .n{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums;min-width:18px}
  /* Feed */
  .feed{padding:34px 28px 90px;display:flex;flex-direction:column;align-items:center;gap:40px}
  .item{width:100%;max-width:760px}
  .meta{max-width:600px;margin:0 auto 12px;padding:0 4px}
  .meta .tag{display:inline-block;font-size:11px;font-weight:700;color:var(--primary);background:var(--accent);
       border:1px solid var(--border);border-radius:999px;padding:3px 10px;margin-inline-end:8px}
  .meta .tag.unsub{color:var(--warn);background:var(--warn-s)}
  .meta .file{font-family:'SFMono-Regular',Consolas,Menlo,monospace;font-size:12px;color:var(--muted)}
  .meta .subj{font-size:15px;font-weight:700;margin:8px 0 2px}
  .meta .subj .k{color:var(--muted);font-weight:600}
  .meta .pre{font-size:12.5px;color:var(--muted)}
  .meta .from{font-size:12px;color:var(--muted);margin-top:3px}
  /* Email canvas */
  .mail{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:24px 12px;
       box-shadow:0 10px 40px -22px rgba(16,40,80,.4)}
  .env{max-width:600px;margin:0 auto}
  .m-head{padding:2px 6px 0}
  .m-logo{display:inline-flex;align-items:center;gap:11px}
  .m-logo svg{display:block}
  .m-wm{font-size:30px;letter-spacing:-.7px;line-height:1;background:var(--grad);
       -webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
  .m-wm .l{font-weight:500}.m-wm .f{font-weight:800}
  .m-rule{height:3px;background:var(--grad);border-radius:3px;margin:14px 6px 18px}
  .m-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .m-pad{padding:30px 34px}
  .eyebrow{font-size:13px;font-weight:600;color:var(--primary);margin:0 0 6px}
  .m-h1{font-size:23px;font-weight:700;line-height:1.35;margin:0 0 14px}
  .m-p{font-size:15.5px;line-height:1.75;margin:0 0 15px}
  .m-p strong{font-weight:700}
  .m-note{font-size:13px;color:var(--muted);line-height:1.65;margin:0 0 8px}
  .m-cta{text-align:center;margin:6px 0 20px}
  .m-cta a{display:inline-block;background:var(--grad);color:#fff;font-weight:700;font-size:15.5px;
       text-decoration:none;border-radius:var(--radius);padding:13px 32px}
  .keybox{background:var(--accent);border:1px solid var(--border);border-radius:var(--radius);
       padding:16px 20px;margin:2px 0 20px;text-align:center}
  .keybox .kl{font-size:12.5px;font-weight:600;color:var(--primary);margin:0 0 7px}
  .keybox .kv{font-family:'SFMono-Regular',Consolas,Menlo,monospace;font-size:21px;font-weight:700;
       letter-spacing:2px;direction:ltr}
  .receipt{border:1px solid var(--border);border-radius:var(--radius);padding:2px 18px;margin:2px 0 20px}
  .rrow{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--border)}
  .rrow:last-child{border-bottom:0}
  .rrow .rl{font-size:14.5px;color:var(--muted)}
  .rrow .rv{font-size:14.5px;font-weight:500;direction:ltr}
  .rrow.strong .rv{font-size:16.5px;font-weight:700;color:var(--primary)}
  .callout{border-radius:11px;padding:13px 17px;margin:2px 0 20px;border-inline-start:3px solid var(--primary);background:var(--accent)}
  .callout.success{border-color:var(--success);background:var(--success-s)}
  .callout.warn{border-color:var(--warn);background:var(--warn-s)}
  .callout.danger{border-color:var(--danger);background:var(--danger-s)}
  .callout .ct{font-size:14.5px;font-weight:700;margin:0 0 3px}
  .callout.success .ct{color:var(--success)}.callout.warn .ct{color:var(--warn)}.callout.danger .ct{color:var(--danger)}.callout .ct{color:var(--primary)}
  .callout .cb{font-size:14.5px;line-height:1.6;margin:0}
  .steps{margin:2px 0 18px}
  .step{display:flex;gap:11px;margin-bottom:11px}
  .step .sn{flex:none;width:26px;height:26px;line-height:26px;text-align:center;border-radius:999px;
       background:var(--primary);color:#fff;font-size:13.5px;font-weight:700}
  .step .sc{font-size:14.5px;line-height:1.55;padding-top:2px}
  .chips{margin:0 0 14px}
  .chip{display:inline-block;background:var(--accent);color:var(--primary);border:1px solid var(--border);
       border-radius:999px;padding:5px 12px;font-size:12.5px;font-weight:600;margin-inline-start:6px}
  .linkfb{font-size:12.5px;color:var(--muted);text-align:center;margin:0 0 16px;word-break:break-all}
  .linkfb a{color:var(--primary);direction:ltr}
  .m-foot{max-width:600px;margin:0 auto;padding:18px 24px 4px;text-align:center}
  .m-foot .fn{font-weight:600;font-size:13px;margin:0 0 5px}
  .m-foot p{font-size:12.5px;color:var(--muted);margin:0 0 8px}
  .m-foot a{color:var(--primary);text-decoration:none}
  .m-foot .unsub{border-top:1px solid var(--border);padding-top:11px;margin-top:6px}
  .m-foot .unsub a{color:var(--muted);text-decoration:underline}
  .m-foot .cp{font-size:11.5px;margin-top:8px}
  /* mobile-width mode */
  body.mob .env,body.mob .m-foot{max-width:390px}
  body.mob .m-pad{padding:24px 20px}
  body.mob .m-h1{font-size:21px}
  @media(max-width:900px){ .layout{grid-template-columns:1fr} .toc{display:none} }
</style>
</head>

/* ── renderers ── */
const logoSVG = `<span class="m-logo"><svg width="34" height="34" viewBox="0 0 24 24"><path d="M4.5 16.5 C4.5 10 10 6 14.5 8 C18.5 9.8 19 14.5 15.5 16 C13.2 17 11 15.6 11.8 13.2" fill="none" stroke="#2756A6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="m-wm"><span class="l">Clinic</span><span class="f">Flow</span></span></span>`;

function block(b){
  switch(b.t){
    case "p": return `<p class="m-p">${b.h}</p>`;
    case "note": return `<p class="m-note">${b.h}</p>`;
    case "cta": return `<div class="m-cta"><a href="#">${b.l}</a></div>`;
    case "key": return `<div class="keybox"><div class="kl">${b.l}</div><div class="kv">${b.v}</div></div>`;
    case "linkfb": return `<p class="linkfb">${b.l}<br><a href="#">${b.href}</a></p>`;
    case "chips": return `<div class="chips">${b.items.map(c=>`<span class="chip">${c}</span>`).join("")}</div>`;
    case "callout": return `<div class="callout ${b.tone||'info'}">${b.title?`<p class="ct">${b.title}</p>`:""}<p class="cb">${b.body}</p></div>`;
    case "receipt": return `<div class="receipt">${b.rows.map(r=>`<div class="rrow ${r[2]?'strong':''}"><span class="rl">${r[0]}</span><span class="rv">${r[1]}</span></div>`).join("")}</div>`;
    case "steps": return `<div class="steps">${b.items.map((it,i)=>`<div class="step"><span class="sn">${i+1}</span><span class="sc">${it}</span></div>`).join("")}</div>`;
    default: return "";
  }
}
function footer(unsub){
  return `<div class="m-foot"><p class="fn">ClinicFlow</p>
   <p>תוכנת ניהול קליניקה שעובדת אופליין — המידע שלך נשאר על המחשב שלך.</p>
   <p><a href="#">clinic-flow.co.il</a>&nbsp;&nbsp;·&nbsp;&nbsp;<a href="#">info@clinic-flow.co.il</a></p>
   ${unsub?`<div class="unsub"><p>קיבלת מייל זה כי נרשמת ל-ClinicFlow. <a href="#">להסרה מרשימת התפוצה</a></p></div>`:""}
   <p class="cp">© 2026 ClinicFlow · כל הזכויות שמורות</p></div>`;
}
function card(e){
  return `<div class="mail"><div class="env"><div class="m-head">${logoSVG}<div class="m-rule"></div></div>
    <div class="m-card"><div class="m-pad">
      ${e.eyebrow?`<p class="eyebrow">${e.eyebrow}</p>`:""}
      <h2 class="m-h1">${e.h1}</h2>
      ${e.body.map(block).join("")}
    </div></div></div>
    ${footer(e.unsub)}</div>`;
}
function meta(e){
  return `<div class="meta">
    <span class="tag">${e.g} · #${String(e.id).padStart(2,"0")}</span>
    ${e.unsub?`<span class="tag unsub">דורש הסרה</span>`:""}
    ${e.star?`<span class="tag" style="background:#fff6e0;color:#9a6b00;border-color:#f0e2bf">⭐ הכי חשוב</span>`:""}
    <span class="file">emails/${e.file}</span>
    <div class="subj"><span class="k">נושא:</span> ${e.subj}</div>
    <div class="pre">📬 ${e.pre}</div>
    <div class="from">מאת: ${FROM}</div>
  </div>`;
}

const feed = document.getElementById("feed");
feed.innerHTML = EM.map(e=>`<section class="item" id="e${e.id}">${meta(e)}${card(e)}</section>`).join("");
document.getElementById("count").textContent = EM.length + " תבניות";

// TOC
const toc = document.getElementById("toc");
let html="";
for(const g of Object.keys(GROUPS)){
  html += `<div class="grp">${GROUPS[g]}</div>`;
  EM.filter(e=>e.g===g).forEach(e=>{
    html += `<a href="#e${e.id}"><span class="n">${String(e.id).padStart(2,"0")}</span><span>${e.subj}</span></a>`;
  });
}
toc.innerHTML = html;

function setW(m){
  document.body.classList.toggle("mob", m==="mob");
  document.getElementById("bMob").classList.toggle("on", m==="mob");
  document.getElementById("bDesk").classList.toggle("on", m!=="mob");
}
</script>
