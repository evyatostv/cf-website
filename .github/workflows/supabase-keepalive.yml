name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 06:00 UTC
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    # BUILD-008: Supabase URL + anon key come from repo secrets (single source),
    # not hardcoded, so they stay in sync with the other CI workflows
    # (process-deletions.yml) and rotate in one place.
    #   SUPABASE_URL       e.g. https://<ref>.supabase.co
    #   SUPABASE_ANON_KEY  the public anon JWT
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -fsS -X GET \
            "$SUPABASE_URL/rest/v1/user_access?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -o /dev/null -w "REST API: %{http_code}\n"

      - name: Ping Edge Function
        run: |
          curl -fsS -X POST \
            "$SUPABASE_URL/functions/v1/notify-contact" \
            -H "Content-Type: application/json" \
            -d '{"keepalive":true}' \
            -o /dev/null -w "Edge Function: %{http_code}\n" || true
